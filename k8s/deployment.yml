apiVersion: apps/v1
kind: Deployment

metadata:
  name: booksphere-app
  namespace: booksphere

spec:
  replicas: 2

  selector:
    matchLabels:
      app: booksphere

  template:
    metadata:
      labels:
        app: booksphere

    spec:
      containers:
      - name: booksphere-container
        image: bshantherishenoy/booksphere:latest

        ports:
        - containerPort: 5000