version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: booksphere_db
    environment:
      POSTGRES_USER: booksphere_user
      POSTGRES_PASSWORD: booksphere_password
      POSTGRES_DB: booksphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksphere_user -d booksphere_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  booksphere:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://booksphere_user:booksphere_password@postgres:5432/booksphere_db

volumes:
  postgres_data: